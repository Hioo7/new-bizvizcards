# Serves the Vite-built SPA static files inside the frontend container.
# Listens on port 3000 to match the nginx upstream block in the root
# nginx/default.conf (which proxies / → frontend:3000).

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # Long-lived cache for hashed assets (Vite appends content hashes)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA catch-all: any unknown path serves index.html so client-side
    # routing works on hard refresh / direct navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
