# Run this file with:
#   docker compose --env-file backend/.env up
#
# The --env-file flag is required: env_file: entries inside a service only
# inject variables into that container, they do NOT feed docker compose's own
# ${...} interpolation below (which is needed to build the backend's
# postgres-hostname connection strings). Since backend/.env isn't sitting next
# to this file (compose's default auto-load location), it must be passed
# explicitly.

services:
  postgres:
    image: postgres:16-alpine
    container_name: cards-app-postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

