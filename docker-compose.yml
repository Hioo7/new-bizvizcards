# Run with:
#   docker compose --env-file backend/.env up -d
#
# The --env-file flag is required — compose needs it to interpolate
# ${POSTGRES_USER} etc. for service environment overrides below.
# backend/.env is not the default auto-load location so must be passed
# explicitly. Containers only receive their own env_file entries, but compose
# itself reads the --env-file for ${VAR} substitution below.
#
# Images are built and pushed by the CI pipeline (see .github/workflows/).
# On the server run once to authenticate with Docker Hub:
#   echo "$DOCKERHUB_TOKEN" | docker login -u <dockerhub-username> --password-stdin

services:
  postgres:
    image: postgres:16-alpine
    container_name: cards-app-postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  minio:
    image: minio/minio
    container_name: cards-app-minio
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  mc-init:
    image: minio/mc
    container_name: cards-app-mc-init
    env_file:
      - ./backend/.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing local/$$MINIO_BUCKET &&
      mc anonymous set download local/$$MINIO_BUCKET/pfp
      "
    networks:
      - app-network

  backend:
    image: ${DOCKERHUB_USERNAME}/bizvizcards-backend:${IMAGE_TAG:-latest}
    container_name: cards-app-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      TEST_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_TEST_DB}?schema=public
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    image: ${DOCKERHUB_USERNAME}/bizvizcards-frontend:${IMAGE_TAG:-latest}
    container_name: cards-app-frontend
    restart: unless-stopped
    networks:
      - app-network

  event-app:
    image: ${DOCKERHUB_USERNAME}/bizvizcards-event-app:${IMAGE_TAG:-latest}
    container_name: cards-app-event
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: cards-app-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8091:80"
    depends_on:
      - backend
      - frontend
      - event-app
    networks:
      - app-network

volumes:
  postgres_data:
  minio_data:

networks:
  app-network:
    driver: bridge
