# Run this file with:
#   docker compose --env-file backend/.env up
#
# The --env-file flag is required: env_file: entries inside a service only
# inject variables into that container, they do NOT feed docker compose's own
# ${...} interpolation below (which is needed to build the backend's
# postgres-hostname connection strings). Since backend/.env isn't sitting next
# to this file (compose's default auto-load location), it must be passed
# explicitly.

services:
  postgres:
    image: postgres:16-alpine
    container_name: cards-app-postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: cards-app-minio
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: creates the media bucket if it doesn't already exist, then
  # exits. Bucket provisioning stays here (infra), not in backend app code, so
  # the backend's own S3 credentials never need bucket-admin permissions.
  # Also grants anonymous read-only access to the "pfp" prefix (nginx routes
  # /media/ straight to MinIO for reads — see nginx/default.conf — so that
  # prefix must be publicly readable; nothing else in the bucket is).
  mc-init:
    image: minio/mc
    container_name: cards-app-mc-init
    env_file:
      - ./backend/.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing local/$$MINIO_BUCKET &&
      mc anonymous set download local/$$MINIO_BUCKET/pfp
      "

