upstream backend {
    server backend:3000;
}

upstream minio {
    server minio:9000;
}

upstream frontend {
    server frontend:3000;
}

upstream event-app {
    server event-app:3001;
}

# Known link-preview crawler user agents (WhatsApp, Telegram, Facebook,
# Twitter/X, LinkedIn, Slack, Discord, Skype, Pinterest, Reddit) — the
# standard technique for SPA + social-preview support: these bots get a
# lightweight, server-rendered Open Graph page instead of the plain SPA
# shell (which they can't execute JS to render); every other visitor is
# completely unaffected.
map $http_user_agent $is_preview_bot {
    default 0;
    ~*facebookexternalhit 1;
    ~*Facebot 1;
    ~*Twitterbot 1;
    ~*WhatsApp 1;
    ~*TelegramBot 1;
    ~*LinkedInBot 1;
    ~*Slackbot 1;
    ~*Discordbot 1;
    ~*SkypeUriPreview 1;
    ~*Pinterest 1;
    ~*redditbot 1;
}

server {
    listen 80;

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        # Anonymous, unsigned reads — only the "pfp" prefix is public in
        # MinIO (see docker-compose.yml's mc-init), so there's no signature
        # to validate here, unlike a presigned-URL setup.
        proxy_pass http://minio/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Smart-card and e-card public pages get a server-rendered Open
        # Graph preview for known link-preview crawlers instead of the
        # plain SPA shell — crawlers don't execute JS, so they'd otherwise
        # never see the card's actual title/image. Internally rewritten
        # (not redirected) so the crawler still sees the original
        # /smartcard/:endpoint or /ecard/:endpoint URL.
        if ($is_preview_bot) {
            rewrite ^/smartcard/([^/?]+)$ /__og-preview/$1 last;
            rewrite ^/ecard/([^/?]+)$ /__og-preview-ecard/$1 last;
        }

        # Only a GET/HEAD navigation can match a redirect (mirrors the
        # legacy app's method gate) — everything else goes straight to the
        # frontend.
        if ($request_method !~ ^(GET|HEAD)$) {
            # No URI part here (unlike other proxy_pass calls below) — nginx
            # forbids that inside an `if` block. A prefix location of "/"
            # with no rewrite already means the full original URI is passed
            # through unchanged either way, so this is behaviorally identical.
            proxy_pass http://frontend;
            break;
        }

        # Ask the backend whether this path is a configured redirect before
        # falling back to the SPA. A match returns a real 307 with a
        # Location header straight through to the client — no frontend code
        # ever loads for a redirected path. A miss (404) or any backend
        # error (5xx) falls through to @frontend, exactly like the legacy
        # app's fail-open behavior.
        proxy_pass http://backend/api/public/redirects/resolve?path=$request_uri;
        proxy_intercept_errors on;
        error_page 404 = @frontend;
        error_page 500 502 503 504 = @frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @frontend {
        # No URI part — nginx forbids that inside a named location. Same
        # reasoning as the `if` block above: full original URI passes
        # through unchanged regardless.
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal-only target for the crawler rewrite above — never reachable
    # directly from outside (see the `internal` directive).
    location ~ ^/__og-preview/(?<smartcard_endpoint>[^/]+)$ {
        internal;
        # A regex location's proxy_pass can't carry a URI part either, so the
        # target path is built via rewrite first, then passed through as-is.
        rewrite ^ /api/public/smart-cards/$smartcard_endpoint/preview break;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal-only target for the e-card crawler rewrite above — never
    # reachable directly from outside (see the `internal` directive).
    location ~ ^/__og-preview-ecard/(?<ecard_endpoint>[^/]+)$ {
        internal;
        rewrite ^ /api/public/ecards/$ecard_endpoint/preview break;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Event app subdomain (event.domain.com) ───────────────────────────────────
server {
    listen 80;
    server_name event.*;

    # API calls from the event app proxy to the shared backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else serves the event SPA
    location / {
        proxy_pass http://event-app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
