upstream backend {
    server backend:3000;
}

upstream minio {
    server minio:9000;
}

# upstream frontend {
#     server frontend:3000;
# }

server {
    listen 80;

    location /api/ {
        proxy_pass http://backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        # Anonymous, unsigned reads — only the "pfp" prefix is public in
        # MinIO (see docker-compose.yml's mc-init), so there's no signature
        # to validate here, unlike a presigned-URL setup.
        proxy_pass http://minio/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Placeholder until the frontend service exists.
        return 503;
        # proxy_pass http://frontend/;
    }
}
